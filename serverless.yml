# ==============================================================================
# SERVICE CONFIGURATION & INFRASTRUCTURE AS CODE (IaC)
# Challenge: Rimac & Softtek Medical Appointment System
# Paradigm: Event-Driven Architecture (EDA) & Clean Architecture
# ==============================================================================

service: rimac-backend-challenge

plugins:
  - serverless-localstack
  - serverless-offline

package:
  # En Serverless v3 con mountCode activo, desactivamos empaquetado individual
  # para que LocalStack tome la estructura virtualizada directamente desde Docker.
  individually: false
  patterns:
    - ".build/**"
    - "!node_modules/**"
    - "!src/**"

provider:
  name: aws
  runtime: nodejs20.x
  region: "us-east-1"
  stage: ${env:STAGE, 'dev'}
  environment:
    NODE_ENV: ${env:NODE_ENV, 'development'}
    DYNAMODB_TABLE: ${self:service}-appointments-${self:provider.stage}
    SNS_TOPIC_ARN:
      Ref: AppointmentTopic
    DYNAMODB_ENDPOINT: ${env:DYNAMODB_ENDPOINT, 'http://host.docker.internal:4566'}
    SNS_ENDPOINT: ${env:SNS_ENDPOINT, 'http://host.docker.internal:4566'}
    MYSQL_PE_HOST: ${env:MYSQL_PE_HOST, 'host.docker.internal'}
    MYSQL_PE_PORT: ${env:MYSQL_PE_PORT, '3306'}
    MYSQL_PE_DATABASE: ${env:MYSQL_PE_DATABASE, 'medical_pe_db'}
    MYSQL_PE_USER: ${env:MYSQL_PE_USER, 'rimac_user_pe'}
    MYSQL_PE_PASSWORD: ${env:MYSQL_PE_PASSWORD, 'rimac_secure_pass_pe'} # Sincronizado con tu password maestro

  # Principle of Least Privilege: Grants minimal IAM execution roles to ensure tight system security.
  iam:
    role:
      statements:
        # 1. DynamoDB Permissions: Allows the core handlers to Create, Read, and Update appointment states.
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Query
            - dynamodb:UpdateItem
          Resource:
            Fn::GetAtt: [AppointmentsTable, Arn]
        # 2. Amazon SNS Permissions: Allows the ingest handler to fan-out transactional events asynchronously.
        - Effect: Allow
          Action:
            - sns:Publish
          Resource:
            Ref: AppointmentTopic

# ==============================================================================
# PHYSICAL AWS INFRASTRUCTURE RESOURCES (CloudFormation Declarations)
# ==============================================================================
resources:
  Resources:
    # --------------------------------------------------------------------------
    # [1] Amazon DynamoDB Table: Transactional State Store
    # --------------------------------------------------------------------------
    AppointmentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.DYNAMODB_TABLE}
        AttributeDefinitions:
          - AttributeName: insuredId
            AttributeType: S
          - AttributeName: appointmentId
            AttributeType: S
        KeySchema:
          - AttributeName: insuredId
            KeyType: HASH # Partition Key (PK) -> Highly optimized for the GET /appointments/{id} endpoint scanner.
          - AttributeName: appointmentId
            KeyType: RANGE # Sort Key (SK) -> Permits a single user to maintain multiple appointment records safely.
        BillingMode: PAY_PER_REQUEST # Serverless on-demand scaling model to minimize idle cloud resource costs.

    # --------------------------------------------------------------------------
    # [2] Amazon SNS Topic: Decoupled Fan-Out Messaging Channel
    # --------------------------------------------------------------------------
    AppointmentTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: ${self:service}-events-topic-${self:provider.stage}

    # --------------------------------------------------------------------------
    # [3] Amazon SQS Channels: Asynchronous Ingestion & Processing Queues
    # --------------------------------------------------------------------------
    PeruQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: SQS_PE
        # RedrivePolicy connects this main queue to its dedicated Dead Letter Queue (DLQ)
        RedrivePolicy:
          deadLetterTargetArn:
            Fn::GetAtt: [PeruQueueDLQ, Arn]
          maxReceiveCount: 3 # Maximum retries before moving the failing message to the DLQ

    PeruQueueDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: SQS_PE_DLQ # Holds poisoned or unprocessable messages for Peru's worker

    ChileQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: SQS_CL
        RedrivePolicy:
          deadLetterTargetArn:
            Fn::GetAtt: [ChileQueueDLQ, Arn]
          maxReceiveCount: 3

    ChileQueueDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: SQS_CL_DLQ # Holds poisoned or unprocessable messages

    FinalQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: SQS_FINAL # Lifecycle loop closure queue capturing EventBridge synchronization signals.

    # --------------------------------------------------------------------------
    # [4] Amazon SNS Subscriptions with Attribute Message Filtering
    # --------------------------------------------------------------------------
    # Enforces the required geographical routing boundaries automatically at the cloud level.
    # The application lambdas never inspect routing parameters manually; SNS does the dispatch.
    PeruSubscription:
      Type: AWS::SNS::Subscription
      Properties:
        TopicArn:
          Ref: AppointmentTopic
        Endpoint:
          Fn::GetAtt: [PeruQueue, Arn]
        Protocol: sqs
        FilterPolicy:
          countryISO:
            - PE # Only routes events explicitly containing the 'PE' attribute metadata to SQS_PE.

    ChileSubscription:
      Type: AWS::SNS::Subscription
      Properties:
        TopicArn:
          Ref: AppointmentTopic
        Endpoint:
          Fn::GetAtt: [ChileQueue, Arn]
        Protocol: sqs
        FilterPolicy:
          countryISO:
            - CL # Only routes events explicitly containing the 'CL' attribute metadata to SQS_CL.

    # --------------------------------------------------------------------------
    # [5] Amazon EventBridge Rule: Asynchronous Lifecycle Router
    # --------------------------------------------------------------------------
    # Acts as the asynchronous loop closure mechanism requested in the architecture diagram.
    # It intercepts compliance tokens emitted by country workers and forwards them to SQS Final.
    EventBridgeToSqsRule:
      Type: AWS::Events::Rule
      Properties:
        Description: "Captures appointment compliance events and routes them safely into SQS Final"
        EventPattern:
          source:
            - "custom.appointments"
          detail-type:
            - "AppointmentConfirmed"
        Targets:
          - Arn:
              Fn::GetAtt: [FinalQueue, Arn]
            Id: "FinalQueueTarget"

custom:
  localstack:
    stages:
      - dev
    lambda:
      # 💡 Obligamos a que use el montaje de volumen local en tiempo real
      mountCode: true
# ==============================================================================
# AWS LAMBDA FUNCTIONS DECLARATION (Serverless Entrypoints)
# ==============================================================================
functions:
  # ----------------------------------------------------------------------------
  # [1] API Ingest Handler (REST Entrypoint)
  # ----------------------------------------------------------------------------
  ingest:
    handler: .build/infra/handlers/ingest/handler.handler
    description: "Synchronous REST API ingress endpoint for medical appointment registration"
    memorySize: 256
    timeout: 10
    events:
      - http:
          path: /appointments
          method: post
          cors: true

  # ----------------------------------------------------------------------------
  # [2] API Query Handler (REST Historical Records Listing)
  # ----------------------------------------------------------------------------
  query:
    handler: .build/infra/handlers/query/handler.handler
    description: "Synchronous REST API scanner endpoint for fetching historical policyholder records"
    memorySize: 256 # Optimized computational sizing for rapid DynamoDB read scans
    timeout: 10
    events:
      - http:
          path: /appointments/{insuredId} # Enforces the path parameter constraint
          method: get
          cors: true

  # ----------------------------------------------------------------------------
  # Asynchronous Regional Worker (Peru - MySQL Target Database)
  # ----------------------------------------------------------------------------
  processPe:
    handler: .build/infra/handlers/process-pe/handler.handler
    description: "Asynchronous worker consuming from SQS_PE to persist processed records inside MySQL"
    memorySize: 256
    timeout: 30
    events:
      - sqs:
          arn: arn:aws:sqs:us-east-1:000000000000:SQS_PE # Properties.QueueName: SQS_PE
          batchSize: 10
